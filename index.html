<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chantell Narrates</title>
  <meta name="description" content="Narration, storytelling, slow-living experiments and creative little tools by Chantell Narrates." />

  <style>
    :root {
      --ink: #241f1a;
      --cream: #f4ead8;
      --paper: #fff8ec;
      --forest: #1f3329;
      --moss: #667052;
      --clay: #ad6544;
      --gold: #b99758;
      --line: rgba(36, 31, 26, 0.12);
      --soft: rgba(36, 31, 26, 0.68);
      --shadow: 0 24px 70px rgba(31, 51, 41, 0.18);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: var(--cream);
      color: var(--ink);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .wrap {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(244, 234, 216, 0.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
    }

    nav {
      min-height: 72px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
    }

    .brand {
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--forest);
    }

    .navlinks {
      display: flex;
      gap: 22px;
      font-family: Arial, sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--soft);
    }

    .navlinks a:hover {
      color: var(--clay);
    }

    .hero {
      padding: 74px 0 64px;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 46px;
      align-items: center;
    }

    .eyebrow {
      font-family: Arial, sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--clay);
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(3.2rem, 8vw, 7rem);
      line-height: 0.88;
      letter-spacing: -0.07em;
      color: var(--forest);
      margin-bottom: 28px;
    }

    .lead {
      max-width: 620px;
      font-size: clamp(1.08rem, 2vw, 1.34rem);
      color: var(--soft);
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 22px;
      border-radius: 999px;
      font-family: Arial, sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .primary {
      background: var(--forest);
      color: var(--paper);
      box-shadow: 0 14px 35px rgba(31, 51, 41, 0.22);
    }

    .secondary {
      background: rgba(255, 248, 236, 0.72);
      border: 1px solid var(--line);
      color: var(--forest);
    }

    .hero-panel {
      min-height: 520px;
      border-radius: 34px;
      padding: 34px;
      background:
        linear-gradient(145deg, rgba(31, 51, 41, 0.96), rgba(19, 30, 25, 0.98)),
        radial-gradient(circle at 30% 20%, rgba(185, 151, 88, 0.32), transparent 34%);
      color: var(--paper);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      position: relative;
    }

    .hero-panel::before {
      content: "";
      position: absolute;
      width: 240px;
      height: 240px;
      border: 1px solid rgba(255, 248, 236, 0.18);
      border-radius: 50%;
      right: -70px;
      top: -70px;
    }

    .hero-panel::after {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(255, 248, 236, 0.12);
      border-radius: 26px;
      pointer-events: none;
    }

    .panel-kicker {
      font-family: Arial, sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255, 248, 236, 0.62);
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }

    .quote {
      font-size: clamp(2rem, 4vw, 3.8rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
      position: relative;
      z-index: 1;
    }

    .panel-bottom {
      position: relative;
      z-index: 1;
      font-family: Arial, sans-serif;
      color: rgba(255, 248, 236, 0.72);
      max-width: 380px;
    }

    section {
      padding: 70px 0;
    }

    .section-title {
      max-width: 720px;
      margin-bottom: 30px;
    }

    h2 {
      font-size: clamp(2.1rem, 4.5vw, 4rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
      color: var(--forest);
      margin-bottom: 14px;
    }

    .muted {
      color: var(--soft);
      font-size: 1.05rem;
    }

      background: var(
